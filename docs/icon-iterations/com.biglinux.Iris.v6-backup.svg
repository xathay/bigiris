<?xml version="1.0" encoding="UTF-8"?>
<!--
  BigIris — ícone v6 (photo-centric, família BigLinux).
  Abandona a metáfora floral — a v2 e v4 ficaram lendo como câmera/
  webcam, a v5 como flor genérica. Troca pela convenção universal de
  app de fotos: paisagem (montanha + sol) dentro de moldura retangular.
  Tom de fundo continua no violeta BigIris (família BigLinux), com o
  wordmark "big" no canto superior esquerdo (convenção Big OCR PDF).
  Flat, duas camadas de montanha + sol dourado, sem gradientes.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <filter id="drop" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.32"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip do interior da moldura para as montanhas e o sol. -->
    <clipPath id="frameClip">
      <rect x="22" y="44" width="84" height="64" rx="8" ry="8"/>
    </clipPath>
  </defs>

  <!-- Container violeta (família BigLinux) -->
  <rect x="6" y="6" width="116" height="116" rx="26" ry="26"
        fill="#6930D6" filter="url(#drop)"/>

  <!-- Wordmark "big" — identidade de família, canto superior esquerdo -->
  <text x="16" y="34" font-family="sans-serif" font-weight="900"
        font-size="20" fill="#FCD34D" letter-spacing="-1">big</text>

  <!-- Moldura de foto (retângulo branco com leve arredondamento) -->
  <rect x="22" y="44" width="84" height="64" rx="8" ry="8"
        fill="#FFFFFF"/>

  <!-- Conteúdo da foto (sky + sol + montanhas), clipado à moldura -->
  <g clip-path="url(#frameClip)">
    <!-- Céu claro -->
    <rect x="22" y="44" width="84" height="42" fill="#E9D5FF"/>

    <!-- Sol dourado -->
    <circle cx="86" cy="60" r="8" fill="#FCD34D"/>

    <!-- Montanha do fundo (tom médio violeta) -->
    <path d="M 22 90
             L 40 66
             L 56 78
             L 74 60
             L 106 90
             L 106 108
             L 22 108 Z"
          fill="#A78BFA"/>

    <!-- Montanha da frente (violeta escuro — sobrepõe a de trás) -->
    <path d="M 22 108
             L 22 98
             L 38 82
             L 56 96
             L 72 86
             L 90 100
             L 106 94
             L 106 108 Z"
          fill="#4C1D95"/>
  </g>

  <!-- Borda sutil da moldura (contraste com o container violeta) -->
  <rect x="22" y="44" width="84" height="64" rx="8" ry="8"
        fill="none" stroke="#4C1D95" stroke-width="1.2" opacity="0.4"/>
</svg>
