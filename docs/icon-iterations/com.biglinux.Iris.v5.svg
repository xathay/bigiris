<?xml version="1.0" encoding="UTF-8"?>
<!--
  BigIris — ícone v5 (minimalista, família BigLinux).
  Corte radical sobre a v4: sem haste, sem folhas, sem centro-preto.
  Apenas três pétalas de íris sobre violeta sólido, em paleta de duas
  cores (branco + dourado). Wordmark "big" movido para baixo como
  assinatura discreta — não compete com o motivo.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <filter id="drop" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.32"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Container violeta sólido -->
  <rect x="6" y="6" width="116" height="116" rx="26" ry="26"
        fill="#6930D6" filter="url(#drop)"/>

  <!-- Três pétalas de íris centralizadas, apenas branco + dourado.
       Geometria simétrica, silhueta limpa em 48px. -->

  <!-- Pétala esquerda (branco) -->
  <path d="M 64 78
           C 44 70, 28 56, 28 38
           C 44 40, 58 52, 64 66 Z"
        fill="#FFFFFF"/>

  <!-- Pétala direita (branco) -->
  <path d="M 64 78
           C 84 70, 100 56, 100 38
           C 84 40, 70 52, 64 66 Z"
        fill="#FFFFFF"/>

  <!-- Pétala central (dourada, sobreposta às laterais para criar
       hierarquia visual clara) -->
  <path d="M 64 82
           C 54 64, 52 38, 64 22
           C 76 38, 74 64, 64 82 Z"
        fill="#FCD34D"/>

  <!-- Assinatura "big" discreta no rodapé — identidade de família
       sem brigar com o motivo. Fonte sans-serif bold. -->
  <text x="64" y="108" font-family="sans-serif" font-weight="800"
        font-size="14" fill="#FFFFFF" opacity="0.85"
        text-anchor="middle" letter-spacing="0.5">big</text>
</svg>
