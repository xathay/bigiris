<?xml version="1.0" encoding="UTF-8"?>
<!--
  BigIris — ícone v2 (concept: "Aperture Bloom").
  Mais ousado em geometria, menos gloss-iOS. Seis pétalas-lâminas de
  abertura fotográfica formando uma hexágono central, cada pétala em uma
  cor do espectro (prisma → refração → íris), com sombreamento pictórico
  sutil em cima. Sem catchlight-estilo-Apple; a luz vem do canto superior
  esquerdo sugerida apenas por um "bloom" suave. Encaixa no GNOME HIG
  painterly-flat moderno.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1b2240"/>
      <stop offset="100%" stop-color="#070a17"/>
    </linearGradient>

    <!-- Shade overlay on each blade: subtle light-to-dark -->
    <linearGradient id="shade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.28"/>
    </linearGradient>

    <!-- Soft bloom from upper-left (implied light source) -->
    <radialGradient id="bloom" cx="25%" cy="20%" r="70%">
      <stop offset="0%"  stop-color="#fff3c4" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="drop" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.8"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.45"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="clipRect">
      <rect x="6" y="6" width="116" height="116" rx="26" ry="26"/>
    </clipPath>

    <!-- Single blade: arc from outer radius 44, narrowing to the
         hexagonal opening at radius 14. Drawn for blade centered on
         +X axis (0°); all others come via <use> + rotate(). -->
    <path id="blade"
          d="M 12.12 -7
             L 38.10 -22
             A 44 44 0 0 1 38.10 22
             L 12.12 7 Z"/>
  </defs>

  <!-- Container rounded-square -->
  <g filter="url(#drop)">
    <rect x="6" y="6" width="116" height="116" rx="26" ry="26" fill="url(#bg)"/>
  </g>

  <!-- Aperture petals in spectrum order, origin at (64,64). No clip-path
       needed — the petals live entirely inside the rounded container. -->
  <g transform="translate(64 64)">
    <use href="#blade" fill="#e63946"/>                       <!-- 0°   red -->
    <use href="#blade" fill="#f4a261" transform="rotate(60)"/>  <!-- 60°  orange -->
    <use href="#blade" fill="#f6c84c" transform="rotate(120)"/> <!-- 120° yellow -->
    <use href="#blade" fill="#2a9d8f" transform="rotate(180)"/> <!-- 180° teal -->
    <use href="#blade" fill="#3a86ff" transform="rotate(240)"/> <!-- 240° blue -->
    <use href="#blade" fill="#9b5de5" transform="rotate(300)"/> <!-- 300° violet -->

    <!-- Pictorial shading: sits on all blades unified so the light is
         directional rather than blade-by-blade. Covers the outer disc
         area and gets clipped by the blades themselves visually. -->
    <circle r="44" fill="url(#shade)"/>

    <!-- Hairline separators between blades — gives precision/photograph
         feel without the childish "crosshair" of v1. -->
    <g stroke="#0a0e1f" stroke-width="0.6" opacity="0.65">
      <line x1="12.12" y1="-7"   x2="38.10" y2="-22"/>
      <line x1="12.12" y1="7"    x2="38.10" y2="22"/>
      <line x1="-12.12" y1="-7"  x2="-38.10" y2="-22"/>
      <line x1="-12.12" y1="7"   x2="-38.10" y2="22"/>
      <line x1="-7" y1="12.12"   x2="-22" y2="38.10"/>
      <line x1="7"  y1="12.12"   x2="22"  y2="38.10"/>
      <line x1="-7" y1="-12.12"  x2="-22" y2="-38.10"/>
      <line x1="7"  y1="-12.12"  x2="22"  y2="-38.10"/>
    </g>

    <!-- Central hexagonal opening (the iris "pupil") -->
    <polygon
      points="12.12,-7 12.12,7 0,14 -12.12,7 -12.12,-7 0,-14"
      fill="#07080f"/>
    <polygon
      points="12.12,-7 12.12,7 0,14 -12.12,7 -12.12,-7 0,-14"
      fill="none" stroke="#000000" stroke-width="0.6" opacity="0.8"/>
  </g>

  <!-- Bloom overlay (directional light), clipped to the container -->
  <rect x="6" y="6" width="116" height="116" rx="26" ry="26"
        fill="url(#bloom)" clip-path="url(#clipRect)"/>
</svg>
