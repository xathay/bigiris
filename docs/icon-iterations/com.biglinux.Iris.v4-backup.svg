<?xml version="1.0" encoding="UTF-8"?>
<!--
  BigIris — ícone v4 (família BigLinux).
  Segue o padrão visual dos outros apps do ecossistema (Big OCR PDF,
  BigCertificados, Big Blocks, BigLinux Forum):
    · Contêiner rounded-square com cor saturada sólida (sem gradiente).
    · Wordmark "big" visível em um canto (identidade de família).
    · Pictograma central flat, alto contraste, sem vidro/gloss/sombra.
  Cor principal: violeta profundo — canônico de flor íris, e distingue
  no grid de apps Big (Big OCR PDF é vermelho, Big Blocks magenta,
  BigLinux Forum azul, BigCertificados roxo-azulado).
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <filter id="drop" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Container sólido violeta (iris-flower). Tom deliberadamente
       distinto dos outros apps Big para diferenciar no grid. -->
  <rect x="6" y="6" width="116" height="116" rx="26" ry="26"
        fill="#6930D6" filter="url(#drop)"/>

  <!-- Faixa superior mais clara — sutileza de profundidade sem recorrer
       a gradientes. Mimetiza o efeito "highlight" flat dos outros apps. -->
  <path d="M 32 6 H 96 A 26 26 0 0 1 122 32 V 24 Q 96 38 64 38 Q 32 38 6 24 V 32 A 26 26 0 0 1 32 6 Z"
        fill="#8B5CF6" opacity="0.65"/>

  <!-- Wordmark "big" (identidade da família BigLinux). Canto superior
       esquerdo, em amarelo quente pra contrastar com o violeta. -->
  <text x="16" y="34" font-family="sans-serif" font-weight="900"
        font-size="20" fill="#FBBF24" letter-spacing="-1">big</text>

  <!-- Íris (flor) — 3 pétalas flat em cores que lembram uma flor
       real de íris variegata: pétala central gema-de-ovo, laterais
       violeta claro. Composição simétrica, leitura clara em 48px. -->

  <!-- Pétala esquerda (violeta claro) -->
  <path d="M 62 78
           C 38 68, 24 52, 24 34
           C 40 36, 56 48, 62 64 Z"
        fill="#C4B5FD"/>

  <!-- Pétala direita (violeta claro) -->
  <path d="M 66 78
           C 90 68, 104 52, 104 34
           C 88 36, 72 48, 66 64 Z"
        fill="#C4B5FD"/>

  <!-- Pétala central (amarelo dourado) -->
  <path d="M 64 80
           C 54 62, 52 38, 64 22
           C 76 38, 74 62, 64 80 Z"
        fill="#FCD34D"/>

  <!-- Centro da flor: pequeno círculo escuro -->
  <circle cx="64" cy="80" r="4.5" fill="#3B0F7A"/>

  <!-- Haste / base implícita — linha delgada que ancora o bloom -->
  <line x1="64" y1="80" x2="64" y2="104"
        stroke="#3B0F7A" stroke-width="3" stroke-linecap="round"/>

  <!-- Duas folhas pequenas saindo da haste (evoca planta) -->
  <path d="M 64 94
           C 52 94, 46 98, 44 104
           C 52 104, 60 102, 64 98 Z"
        fill="#34D399"/>
  <path d="M 64 94
           C 76 94, 82 98, 84 104
           C 76 104, 68 102, 64 98 Z"
        fill="#34D399"/>
</svg>
