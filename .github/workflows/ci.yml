name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy-headless:
    name: clippy (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # `image` is a non-optional dep with `avif-native` enabled, which
      # pulls dav1d-sys. dav1d is an image codec, not a UI lib, so even
      # the "headless" workspace build needs libdav1d-dev.
      - name: install libdav1d-dev
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdav1d-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  clippy-gui:
    name: clippy (gui + ai)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install GTK4/libadwaita/dav1d dev
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev libdav1d-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p bigiris --features "gui ai" --all-targets --locked -- -D warnings

  test:
    name: test (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install libdav1d-dev
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdav1d-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets --locked

  test-gui:
    name: test (gui + ai)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install GTK4/libadwaita/dav1d dev
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev libdav1d-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Tests in `crates/bigiris/src/gui.rs` (the 20 anchor/zoom tests)
      # only compile with `--features gui`, so they need their own job.
      - run: cargo test -p bigiris --features "gui ai" --all-targets --locked

  build:
    name: build (release, gui + ai)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install GTK4/libadwaita/dav1d dev
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev libdav1d-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `ai` usa load-dynamic do ort: compila sem libonnxruntime presente,
      # so precisaria do .so em runtime (e self-test nao carrega o backend).
      - run: cargo build --release --locked --features "gui ai" -p bigiris
      - run: ./target/release/bigiris --self-test

  appstream:
    name: AppStream metainfo validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install appstreamcli
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends appstream
      # --no-net evita lookup das URLs (homepage, bugtracker) que sao
      # warnings esperados antes do repo virar publico. Trocar por
      # `appstreamcli validate` (sem --no-net) quando o repo for publico.
      - run: appstreamcli validate --no-net data/com.biglinux.Iris.metainfo.xml

  desktop:
    name: .desktop validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install desktop-file-utils
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends desktop-file-utils
      - run: desktop-file-validate data/com.biglinux.Iris.desktop

  makepkg:
    name: makepkg (Arch container, PKGBUILD.local)
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: install Arch deps
        run: |
          pacman -Syu --noconfirm --needed base-devel rust git sudo
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          # Force the final linker to bfd. Stable Rust 1.85+ defaults the
          # x86_64-unknown-linux-gnu target's linker-flavor to `gnu-lld-cc`,
          # which injects `-fuse-ld=lld` into the gcc invocation *after*
          # any user `-Clink-arg=-fuse-ld=bfd`, so gcc's last-wins
          # resolution picks lld. The unstable `gnu-cc` flavor would fix
          # this but isn't available on stable. lld in archlinux:latest
          # fails to resolve C symbols bundled inside Rust rlibs (mimalloc
          # here, previously ring) — `mi_free`, `mi_malloc_aligned` etc.
          # show up undefined even though libmimalloc-sys built fine.
          #
          # Workaround: thin wrapper that strips `-fuse-ld=*` from the
          # args and re-adds `-fuse-ld=bfd` at the very end. Point rustc
          # at it via `-C linker=`.
          cat > /usr/local/bin/cc-bfd <<'WRAP'
          #!/bin/bash
          args=()
          for a in "$@"; do
            case "$a" in
              -fuse-ld=*) ;;
              *) args+=("$a") ;;
            esac
          done
          exec /usr/bin/cc "${args[@]}" -fuse-ld=bfd
          WRAP
          chmod +x /usr/local/bin/cc-bfd
          for f in /etc/makepkg.conf /etc/makepkg.conf.d/rust.conf; do
            [ -f "$f" ] || continue
            echo 'RUSTFLAGS+=" -C linker=/usr/local/bin/cc-bfd"' >> "$f"
          done
      - uses: actions/checkout@v4
      - name: chown for builder
        run: chown -R builder:builder .
      # Usa PKGBUILD.local (build do checkout local, sem clone remoto).
      # O PKGBUILD principal usa `source=git+https://github.com/xathay/bigiris`,
      # que makepkg nao consegue clonar em repo privado sem credenciais.
      - name: makepkg
        working-directory: pkgbuild
        run: |
          sudo -u builder PKGEXT=.pkg.tar makepkg \
            -p PKGBUILD.local \
            --noconfirm \
            --syncdeps \
            --skipchecksums \
            --skipinteg \
            --nocheck \
            --clean
      - name: diagnose rlib bundling on failure
        if: failure()
        working-directory: pkgbuild
        run: |
          set -x
          rlib=$(find src/target -name 'liblibmimalloc_sys-*.rlib' | head -1)
          echo "rlib=$rlib"
          if [ -n "$rlib" ]; then
            ar t "$rlib"
            tmp=$(mktemp -d)
            (cd "$tmp" && ar x "$OLDPWD/$rlib" && ls -la && \
              for o in *.o; do
                printf "\n=== nm %s | mi_ ===\n" "$o"
                nm "$o" 2>/dev/null | grep -E "mi_free|mi_malloc_aligned" | head -5 || echo "(no mi_ symbols)"
              done)
          fi
          out=$(find src/target -path '*libmimalloc-sys-*/out' -type d | head -1)
          echo "out=$out"
          [ -n "$out" ] && ls -la "$out" && (cd "$out" && for a in *.a; do echo "=== $a ==="; ar t "$a" | head -10; done)
