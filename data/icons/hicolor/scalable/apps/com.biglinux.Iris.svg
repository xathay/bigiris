<?xml version="1.0" encoding="UTF-8"?>
<!--
  BigIris — ícone v7 (photo-centric + wordmark "big" oficial BigLinux).
  Base igual à v6: violeta sólido + paisagem dentro de moldura. Troca o
  text SVG genérico "big" pelo glifo vetorial oficial da família Big
  (extraído de Big-Shot/big-shot.svg path8, mesmos letterforms usados em
  Big OCR PDF, BigCertificados e afins). Wordmark escalado e posicionado
  no canto superior esquerdo, em branco — combina com o violeta e a
  convenção do Big OCR PDF.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <filter id="drop" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.32"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="frameClip">
      <rect x="22" y="44" width="84" height="64" rx="8" ry="8"/>
    </clipPath>
  </defs>

  <!-- Container violeta (família BigLinux) -->
  <rect x="6" y="6" width="116" height="116" rx="26" ry="26"
        fill="#6930D6" filter="url(#drop)"/>

  <!-- Wordmark "big" oficial — path vetorial extraído de Big-Shot,
       escalado 3× e posicionado no topo-esquerdo. Branco sobre violeta.
       (Coords originais em viewBox 0 0 24 24; só a parte do wordmark,
       sem a moldura de câmera que o Big-Shot tinha em cima.) -->
  <g transform="translate(-6 2) scale(3)" fill="#FFFFFF">
    <path d="M 14.351562 4.0644531 C 14.268896 4.0644531 14.181844 4.0718906 14.089844 4.0878906 C 12.608844 4.3348906 12.669922 6.0605469 12.669922 6.0605469 C 12.669922 6.0605469 12.669812 6.8239375 13.382812 7.2109375 C 13.976812 7.5509375 14.317 7.1810469 14.375 7.1230469 C 14.433 7.0650469 15.639312 5.5588281 15.445312 8.4238281 C 15.445312 8.4238281 15.869484 7.9613281 15.896484 6.8613281 C 15.923484 5.7613281 15.214844 5.6933594 15.214844 5.6933594 C 15.214844 5.6933594 14.90225 5.6141563 14.28125 6.2851562 C 13.77825 6.8301562 13.653 6.9118281 13.625 6.9238281 L 13.621094 6.9257812 L 13.619141 6.9257812 C 13.619141 6.9257812 13.443828 7.0492813 13.423828 6.7382812 C 13.403828 6.4282813 13.333203 5.4855625 14.283203 4.9765625 C 15.228203 4.4665625 15.689453 5.7148437 15.689453 5.7148438 C 15.689453 5.7148438 15.585563 4.0644531 14.351562 4.0644531 z M 11.677734 4.7792969 A 1 1 0 0 0 11.503906 4.8007812 C 11.139906 4.8777812 10.892172 5.1605937 10.951172 5.4335938 C 11.009172 5.7055938 11.350844 5.8622031 11.714844 5.7832031 C 12.076844 5.7052031 12.323625 5.4223906 12.265625 5.1503906 C 12.216625 4.9283906 11.974734 4.77825 11.677734 4.78125 L 11.677734 4.7792969 z M 8.5546875 4.9941406 C 8.5546875 4.9941406 8.1295156 5.4566875 8.1035156 6.5546875 C 8.0765156 7.6546875 8.7832031 7.7207031 8.7832031 7.7207031 C 8.7832031 7.7207031 9.0957969 7.7989063 9.7167969 7.1289062 C 10.223453 6.5815625 10.348861 6.4983178 10.376953 6.4882812 L 10.380859 6.4882812 C 10.380859 6.4882812 10.555172 6.3647813 10.576172 6.6757812 C 10.596172 6.9857812 10.664797 7.9305 9.7167969 8.4375 C 8.7697969 8.9445 8.3085937 7.6992187 8.3085938 7.6992188 C 8.3085938 7.6992188 8.4262031 9.5731719 9.9082031 9.3261719 C 11.388203 9.0791719 11.328125 7.3535156 11.328125 7.3535156 C 11.328125 7.3535156 11.329234 6.589125 10.615234 6.203125 C 10.022234 5.863125 9.6820469 6.2320156 9.6230469 6.2910156 C 9.5630469 6.3500156 8.3626875 7.8551406 8.5546875 4.9941406 z M 11.824219 5.9101562 A 0.514 0.514 0 0 0 11.373047 6.5800781 C 11.373047 6.5800781 11.67325 7.7695938 13.28125 7.8085938 C 13.28125 7.8075937 12.353 7.1448125 12.375 6.3828125 A 0.514 0.514 0 0 0 11.824219 5.9101562 z"/>
  </g>

  <!-- Moldura de foto (retângulo branco) -->
  <rect x="22" y="44" width="84" height="64" rx="8" ry="8"
        fill="#FFFFFF"/>

  <!-- Conteúdo da foto (sky + sol + montanhas), clipado à moldura -->
  <g clip-path="url(#frameClip)">
    <rect x="22" y="44" width="84" height="42" fill="#E9D5FF"/>
    <circle cx="86" cy="60" r="8" fill="#FCD34D"/>
    <path d="M 22 90 L 40 66 L 56 78 L 74 60 L 106 90 L 106 108 L 22 108 Z"
          fill="#A78BFA"/>
    <path d="M 22 108 L 22 98 L 38 82 L 56 96 L 72 86 L 90 100 L 106 94 L 106 108 Z"
          fill="#4C1D95"/>
  </g>

  <!-- Borda sutil da moldura -->
  <rect x="22" y="44" width="84" height="64" rx="8" ry="8"
        fill="none" stroke="#4C1D95" stroke-width="1.2" opacity="0.4"/>
</svg>
